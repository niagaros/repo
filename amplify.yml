version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - |
              if [ "$AWS_BRANCH" = "main" ]; then
                SECRET_ID="niagaros/cspm/frontend-config/prod"
              else
                SECRET_ID="niagaros/cspm/frontend-config/acceptance"
              fi
            - aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text > public/config.json
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*


name: Discord Notifications

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, closed, reopened, ready_for_review, review_requested]
  issues:
    types: [opened, closed, reopened, assigned, labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Push notification
        if: github.event_name == 'push'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            📦 **Push** to `${{ github.ref_name }}` by **${{ github.actor }}**
            ${{ github.event.head_commit.message }}
            ${{ github.event.head_commit.url }}

      - name: Pull request notification
        if: github.event_name == 'pull_request'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            🔀 **PR ${{ github.event.action }}**: ${{ github.event.pull_request.title }}
            By **${{ github.actor }}** → `${{ github.event.pull_request.base.ref }}`
            ${{ github.event.pull_request.html_url }}

      - name: Issue notification
        if: github.event_name == 'issues'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            🐛 **Issue ${{ github.event.action }}**: ${{ github.event.issue.title }}
            By **${{ github.actor }}**
            ${{ github.event.issue.html_url }}
